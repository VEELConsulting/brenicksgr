<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- browser frame -->
  <rect x="30" y="45" width="140" height="110" rx="4"
        fill="none" stroke="#A88447" stroke-width="2"/>
  <!-- top bar divider -->
  <line x1="30" y1="70" x2="170" y2="70" stroke="#A88447" stroke-width="2"/>
  <!-- three dots -->
  <circle cx="44" cy="57.5" r="3" fill="#A88447"/>
  <circle cx="58" cy="57.5" r="3" fill="#A88447"/>
  <circle cx="72" cy="57.5" r="3" fill="#A88447"/>
  <!-- content block -->
  <rect x="44" y="84" width="36" height="36" fill="none" stroke="#A88447" stroke-width="2"/>
  <!-- text lines -->
  <line x1="92" y1="90" x2="156" y2="90" stroke="#A88447" stroke-width="2"/>
  <line x1="92" y1="104" x2="156" y2="104" stroke="#A88447" stroke-width="2"/>
  <line x1="92" y1="118" x2="140" y2="118" stroke="#A88447" stroke-width="2"/>
</svg>
