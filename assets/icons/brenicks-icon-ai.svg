<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- hexagon outline -->
  <polygon points="100,30 160,65 160,135 100,170 40,135 40,65"
           fill="none" stroke="#A88447" stroke-width="2" stroke-linejoin="round"/>
  <!-- center node -->
  <circle cx="100" cy="100" r="12" fill="none" stroke="#A88447" stroke-width="2"/>
  <!-- vertex nodes -->
  <circle cx="100" cy="30" r="6" fill="none" stroke="#A88447" stroke-width="2"/>
  <circle cx="160" cy="65" r="6" fill="none" stroke="#A88447" stroke-width="2"/>
  <circle cx="160" cy="135" r="6" fill="none" stroke="#A88447" stroke-width="2"/>
  <circle cx="100" cy="170" r="6" fill="none" stroke="#A88447" stroke-width="2"/>
  <circle cx="40" cy="135" r="6" fill="none" stroke="#A88447" stroke-width="2"/>
  <circle cx="40" cy="65" r="6" fill="none" stroke="#A88447" stroke-width="2"/>
</svg>
